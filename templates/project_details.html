<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>项目详情 - PartShelf</title>
    <link href="../static/css/bootstrap.css" rel="stylesheet">
    <link href="../static/css/custom.css" rel="stylesheet">
    <script src="../static/js/bootstrap.bundle.js"></script>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="/">
            <i class="fas fa-microchip"></i> PartShelf
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasDarkNavbar" aria-controls="offcanvasDarkNavbar" aria-label="切换导航">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="offcanvas offcanvas-end text-bg-dark" tabindex="-1" id="offcanvasDarkNavbar" aria-labelledby="offcanvasDarkNavbarLabel">
            <div class="offcanvas-header">
              <h5 class="offcanvas-title" id="offcanvasDarkNavbarLabel">菜单</h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="关闭"></button>
            </div>
            <div class="offcanvas-body">
              <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
                <li class="nav-item">
                  <a class="nav-link" href="/inventory"><i class="fas fa-boxes"></i> 我的库存</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/projects"><i class="fas fa-project-diagram"></i> 我的项目</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#"><i class="fas fa-info-circle"></i> 项目详情</a>
                </li>
              </ul>
              <form class="d-flex mt-3 mt-lg-0" role="search">
                <input class="form-control me-2" type="search" placeholder="搜索零件" aria-label="搜索">
                <button class="btn btn-success" type="submit">搜索</button>
              </form>
            </div>
          </div>
        </div>
      </nav>
      
      <div class="container mt-5 pt-5">
        <div class="row">
          <div class="col-12">
            <!-- 项目基本信息 -->
            <div class="card mb-4">
              <div class="card-header bg-light d-flex justify-content-between align-items-center">
                <h4 class="card-title mb-0" id="projectName"><i class="fas fa-spinner fa-spin"></i> 加载中...</h4>
                <div>
                    <button class="btn btn-outline-primary btn-sm"><i class="fas fa-edit"></i> 编辑</button>
                    <button class="btn btn-outline-danger btn-sm"><i class="fas fa-trash"></i> 删除</button>
                </div>
              </div>
              <div class="card-body">
                <div class="row">
                  <div class="col-md-8">
                    <h6 class="text-muted text-uppercase small fw-bold">项目名称</h6>
                    <p class="fs-5" id="projectNameText">加载中...</p>
                    
                    <h6 class="text-muted text-uppercase small fw-bold mt-3">项目描述</h6>
                    <p class="text-muted" id="projectDescription">加载中...</p>
                  </div>
                  <div class="col-md-4 border-start">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">器件种类数:</span>
                        <span id="partCount" class="badge bg-primary rounded-pill">0</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span class="text-muted">项目ID:</span>
                        <span id="projectId" class="font-monospace">...</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
            
            <!-- BOM表 -->
            <div class="card">
              <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="card-title mb-0"><i class="fas fa-list-ul"></i> BOM表 (物料清单)</h5>
                <button class="btn btn-success btn-sm"><i class="fas fa-plus"></i> 添加物料</button>
              </div>
              <div class="card-body p-0">
                <div class="table-container shadow-none mb-0">
                  <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                      <tr>
                        <th>零件ID</th>
                        <th>零件名称</th>
                        <th>制造商</th>
                        <th>类型</th>
                        <th>封装</th>
                        <th>需求数量</th>
                        <th>描述</th>
                      </tr>
                    </thead>
                    <tbody id="bomTableBody">
                      <tr>
                        <td colspan="7" class="text-center py-5">
                          <div class="spinner-border text-primary" role="status">
                            <span class="visually-hidden">加载中...</span>
                          </div>
                          <p class="mt-2 text-muted">正在加载BOM表...</p>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                
                <div id="noBomData" class="text-center py-5" style="display: none;">
                  <i class="fas fa-clipboard-list fa-3x text-muted mb-3"></i>
                  <p class="text-muted">该项目暂无BOM数据</p>
                  <button class="btn btn-primary">
                    <i class="fas fa-plus"></i> 添加第一个物料
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <script src="../static/js/project_details.js"></script>
  </body>
</html>
